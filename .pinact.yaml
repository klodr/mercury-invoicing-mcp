version: 3

files:
  - pattern: ".github/workflows/*.yml"
  - pattern: ".github/workflows/*.yaml"
  - pattern: ".github/actions/**/action.yml"
  - pattern: ".github/actions/**/action.yaml"

ignore_actions:
  # Internal reusable workflows/actions, pinned by commit SHA. The
  # klodr/.github repo has no version tags, so pinact cannot map a SHA
  # to a version comment — skip the version-comment verification.
  - name: klodr/\.github/\.github/(workflows|actions)/.*
    ref: .*
