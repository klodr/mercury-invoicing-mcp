name: Lockfile lint

# Anti supply-chain check: every URL in `package-lock.json` must point
# to the official npm registry. Catches a malicious `resolved:` host
# slipping in via a hand-crafted lockfile commit (e.g. compromised
# contributor / typo-squatted registry mirror) before npm install ever
# runs.
#
# Also gates `integrity` (every entry must carry a SRI hash) and the
# allowed protocol set.

on:
  # No paths-filter: this workflow MUST run on every push/PR even
  # when nothing in the lockfile changed, otherwise listing it as a
  # required status check in the main ruleset would block every
  # non-lockfile-touching PR forever (the check would never report).
  # Cost is ~10s — negligible. The trade-off: an extra run per PR
  # in exchange for a check that always reports.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-lint:
    name: Lockfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Preflight lockfile host/integrity (no install)
        # Validate registry URLs + SRI presence BEFORE `npm ci` consumes
        # the lockfile. Without this, a malicious `resolved:` host or a
        # missing `integrity` slipping into a PR would already be fetched
        # by `npm ci` before `lockfile-lint` had a chance to flag it.
        # Pure node — no npm install yet, no transitive trust.
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const lock = JSON.parse(readFileSync("package-lock.json", "utf8"));
            if (
              !lock ||
              typeof lock !== "object" ||
              Array.isArray(lock) ||
              !lock.packages ||
              typeof lock.packages !== "object" ||
              Array.isArray(lock.packages)
            ) {
              console.error("package-lock.json format unsupported: missing top-level \"packages\" object (lockfile v1 or v2 without packages?). Regenerate with `npm install` on npm v7+.");
              process.exit(1);
            }
            const bad = [];
            for (const [name, meta] of Object.entries(lock.packages)) {
              if (!name || !meta || meta.link) continue;
              if (meta.resolved && !meta.resolved.startsWith("https://registry.npmjs.org/")) {
                bad.push(name + ": resolved=" + meta.resolved);
              }
              if (meta.resolved && !meta.integrity) {
                bad.push(name + ": missing integrity");
              }
            }
            if (bad.length) {
              console.error("package-lock preflight failed:\n" + bad.join("\n"));
              process.exit(1);
            }
            console.log("preflight OK: " + Object.keys(lock.packages).length + " entries");
          '

      - name: Install dependencies (locked, no scripts)
        # `npm ci` consumes package-lock.json — preflight above already
        # rejected hostile `resolved:` URLs and missing SRI. Lifecycle
        # scripts are still blocked defensively via --ignore-scripts.
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: npm ci --ignore-scripts

      - name: Validate package-lock.json (full defense-in-depth)
        # Same SRI/host check as the preflight + extra rules
        # (--validate-package-names) that need lockfile-lint installed.
        run: |
          npx --no-install lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-package-names \
            --validate-integrity
