name: Lockfile lint

# Anti supply-chain check: every URL in `package-lock.json` must point
# to the official npm registry. Catches a malicious `resolved:` host
# slipping in via a hand-crafted lockfile commit (e.g. compromised
# contributor / typo-squatted registry mirror) before npm install ever
# runs.
#
# Also gates `integrity` (every entry must carry a SRI hash) and the
# allowed protocol set.

on:
  # No paths-filter: this workflow MUST run on every push/PR even
  # when nothing in the lockfile changed, otherwise listing it as a
  # required status check in the main ruleset would block every
  # non-lockfile-touching PR forever (the check would never report).
  # Cost is ~10s — negligible. The trade-off: an extra run per PR
  # in exchange for a check that always reports.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-lint:
    name: Lockfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install lockfile-lint (pinned tarball, sha512-verified)
        # Pin by hash, not by version. Pulls the published tarball,
        # verifies the sha512 (taken from `npm view lockfile-lint@4.14.1
        # dist.integrity`) before installing — same defense-in-depth
        # pattern as the OSV-Scanner step. Scorecard’s
        # PinnedDependenciesID gate flags `npm install -g pkg@vX` as
        # unpinned; this satisfies the gate without giving up
        # provisioning ergonomics.
        env:
          # Disable lifecycle scripts during the global install — defense-
          # in-depth against a transitive postinstall trying to side-load.
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          LOCKFILE_LINT_VERSION: "4.14.1"
          LOCKFILE_LINT_SHA512: "NW0Tk1qfldhbhJWQENYQWANdmlanXKxvTJYRYKn56INYjaP2M07Ua2SJYkUMS+ZbYwxDzul/C6pDsV/NEXrl+A=="
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
               --retry 3 --retry-all-errors \
               --connect-timeout 10 --max-time 120 \
               -o lockfile-lint.tgz \
               "https://registry.npmjs.org/lockfile-lint/-/lockfile-lint-${LOCKFILE_LINT_VERSION}.tgz"
          actual=$(openssl dgst -sha512 -binary lockfile-lint.tgz | openssl base64 -A)
          if [ "${actual}" != "${LOCKFILE_LINT_SHA512}" ]; then
            echo "sha512 mismatch: expected=${LOCKFILE_LINT_SHA512} actual=${actual}"
            exit 1
          fi
          npm install -g ./lockfile-lint.tgz

      - name: Validate package-lock.json
        run: |
          lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-package-names \
            --validate-integrity
