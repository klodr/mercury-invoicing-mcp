name: release-please

# Google's release-please. Watches main for Conventional Commits,
# accumulates release-worthy changes into a perpetually-updated
# release PR, and on merge of that PR: creates the GitHub Release,
# bumps the version in package.json + server.json + src/server.ts:
# VERSION + the .release-please-manifest.json, and pushes the matching
# tag (which fires release.yml → signed artifact → npm publish with
# provenance).
#
# Replaces the manual "create release branch / npm version / convert
# CHANGELOG / open PR / merge / tag / push" loop. The maintainer only
# has to land conventional-commits-style PRs (`feat:`, `fix:`,
# `chore(deps):`, ...) and merge the auto-generated release PR when
# ready.
#
# Reference: https://github.com/googleapis/release-please-action

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # The action reads release-please-config.json + the manifest
          # at the repo root automatically when these flags are set.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
