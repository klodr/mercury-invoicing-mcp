name: release-please

# Google's release-please. Watches main for Conventional Commits,
# accumulates release-worthy changes into a perpetually-updated
# release PR, and on merge of that PR: creates the GitHub Release,
# bumps the version in package.json + server.json + src/server.ts:
# VERSION + the .release-please-manifest.json, and pushes the matching
# tag (which fires release.yml → signed artifact → npm publish with
# provenance).
#
# Replaces the manual "create release branch / npm version / convert
# CHANGELOG / open PR / merge / tag / push" loop. The maintainer only
# has to land conventional-commits-style PRs (`feat:`, `fix:`,
# `chore(deps):`, ...) and merge the auto-generated release PR when
# ready.
#
# Reference: https://github.com/googleapis/release-please-action

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Mint a short-lived GitHub App installation token. Pushing the
      # release PR + the release tag with this token (instead of the
      # default GITHUB_TOKEN) makes the downstream `release.yml` workflow
      # fire automatically — GitHub blocks workflow-triggered workflows
      # when the originating actor is the runner's GITHUB_TOKEN, but
      # treats App-installation tokens as human-equivalent.
      - name: Mint release-please App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          # The action reads release-please-config.json + the manifest
          # at the repo root automatically when these flags are set.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
