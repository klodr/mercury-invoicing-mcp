name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: klodr/.github/.github/workflows/reusable-node-ci.yml@91d67772fb922f21057938eed7431c48a78c70e5 # main @ 2026-07-04
    permissions:
      contents: read
      id-token: write
    with:
      codecov-slug: "klodr/mercury-invoicing-mcp"
      coverage-strategy: "always"
