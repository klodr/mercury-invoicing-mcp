name: Gitleaks (secret scanning)

# Scans every push and PR for accidentally-committed secrets (API
# keys, tokens, certificates, .env files). Free OSS scanner under
# the standard MIT license.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read
  # gitleaks-action queries /repos/.../pulls/<n>/commits to enumerate
  # the PR's commit list. Without `pull-requests: read` the API call
  # 403s and the whole job exits with "Resource not accessible by
  # integration" — purely a permission grant, no secret involved.
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed so gitleaks can audit every commit on
          # PR branches, not just the head.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action v2.3.9 declares `runs.using: node20`, which
          # GitHub will force to node24 by default starting 2026-06-02
          # and remove node20 entirely 2026-09-16. Opt into node24 now
          # to silence the deprecation warning and validate compatibility
          # before the forced flip. Upstream has not cut a node24 release
          # since v2.3.9 (2025-04-17); revisit when a successor lands.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
