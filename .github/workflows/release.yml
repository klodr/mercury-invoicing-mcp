name: Release & npm publish

on:
  release:
    types: [published]
  workflow_dispatch:

# Default workflow permissions: read-only. The publish job below escalates
# only what it needs, only for release events.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

  publish:
    name: Sign release artifacts + publish to npm
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload signed artifacts to the GitHub Release
      id-token: write       # npm provenance + Sigstore keyless signing
      attestations: write   # actions/attest-build-provenance writes to the attestation API
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Setup Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.0
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build (production, sourcemaps stripped)
        run: npm run build
        env:
          NODE_ENV: production

      # Sign + upload signed assets BEFORE the (non-idempotent) npm publish,
      # so a transient failure on signing or asset upload doesn't leave us
      # stuck with a published version we cannot re-run the workflow for.

      - name: Generate Sigstore attestation for dist/index.js
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/index.js

      - name: Attach signed artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          test -n "${BUNDLE_PATH:-}" || { echo "Missing attestation bundle-path output"; exit 1; }
          test -f "$BUNDLE_PATH" || { echo "Bundle file not found: $BUNDLE_PATH"; exit 1; }
          cp "$BUNDLE_PATH" dist/index.js.sigstore
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/index.js \
            dist/index.js.sigstore \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
