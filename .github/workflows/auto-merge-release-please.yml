name: Auto-merge release-please PR

# Arms `--squash --auto --delete-branch` on the perpetually-updated PR
# opened by klodr-release-please[bot]. Once required CI checks go green
# the PR self-merges, which fires release.yml downstream (signed
# artifact + npm publish with provenance).
#
# Caller is intentionally minimal — the filter on the bot login and the
# App-token mint live inside the reusable workflow on klodr/.github.

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Workflow-level permissions are read-only. The `call` job below
# escalates only the writes the reusable needs (contents +
# pull-requests). Without this top-level cap, Scorecard's
# Token-Permissions check flags the workflow on the missing
# default and any future job added here would inherit the
# runner's GITHUB_TOKEN scope.
permissions:
  contents: read

jobs:
  call:
    # The reusable workflow needs to arm `gh pr merge --auto` (writes the
    # PR's auto-merge field via the PullRequest GraphQL mutation) and
    # delete the branch on merge — hence `contents: write` (branch delete)
    # and `pull-requests: write` (auto-merge field). The reusable's
    # `permissions:` ceiling cannot exceed what the caller grants here,
    # so the caller grant must match exactly. Job-level (not workflow-
    # level) so any future job added to this file cannot accidentally
    # inherit write scope.
    permissions:
      contents: write
      pull-requests: write
    # Defense-in-depth: gate secrets at the caller before they're passed to
    # the reusable workflow. The reusable also has its own bot-login filter,
    # but matching here means the secrets are only forwarded for the one
    # event that needs them, and human/dependabot PRs short-circuit early.
    if: ${{ github.event.pull_request.user.login == 'klodr-release-please[bot]' }}
    uses: klodr/.github/.github/workflows/reusable-auto-merge-release-please.yml@5a3a5093bc93bc2a682b5a0cb438149af2516f4c
    secrets:
      RELEASE_PLEASE_CLIENT_ID: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
      RELEASE_PLEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
