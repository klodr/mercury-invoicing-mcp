name: Actions pinned

# Triggers on EVERY PR (no `paths:` filter). When used as a required
# status check in branch protection, a `paths:` filter would cause
# GitHub to skip creating a run on unrelated PRs and leave the check
# in a perpetual "Pending" state, blocking merges. The pinact check
# itself is fast (~5s on a clean repo), so always running it is
# cheaper than dealing with the required-check skip semantics.
on:
  pull_request:

permissions: {}

jobs:
  pinact:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: suzuki-shunsuke/pinact-action@896d595f299e71d65b9d28349d6956abe144390a # v3.0.0
        with:
          # `version` was removed in pinact-action v2: the pinact binary
          # is now bundled with the action tag, so the action SHA above
          # is the only thing pinning the pinact version.
          skip_push: "true"
        env:
          GITHUB_TOKEN: ${{ github.token }}
