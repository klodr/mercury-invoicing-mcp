coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1.5%
        # Project coverage shouldn't drop more than 1.5% in any single PR.
        # The 1.5% (vs the historical 0.5%) absorbs the one-shot accounting
        # gap of the istanbul → v8 instrumentation switch in the jest →
        # vitest migration: v8 splits some ternary/optional branches that
        # istanbul collapsed, surfacing ~7 "partials" with no real loss
        # of code coverage. Tighten back once the next baseline lands.
    patch:
      default:
        target: 95%
        threshold: 2%
        # Strict patch gate (95% target, 2% threshold) — new code must be
        # ≥93% covered. The 2% threshold (vs an absolute 95% requirement)
        # exists for two narrow exceptions, not a blanket relaxation:
        # - Defensive code paths (e.g. TOCTOU re-checks, OS-level error
        #   branches) are intentionally hard to exercise in unit tests.
        # - Pure-formatting PRs (Prettier reflows, ESLint cleanups)
        #   surface as "new" lines but add no logic to test.

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
